services:

  frontend:
    build:
      context: .
      dockerfile: GroceryList.Docker/dockerfile_frontend
    ports:
      - 3000:3000
    depends_on:
      - postgres
    networks:
      - grocerylist_network
      
  api:
    build:
      context: .
      dockerfile: GroceryList.Docker/dockerfile_api
    ports:
      - 8080:8080
    environment:
      - ConnectionStrings__Postgres=Host=postgres;Port=5432;Database=postgres;Username=postgres;Password=postgres;
    depends_on:
      - postgres
    networks:
      - grocerylist_network

  postgres:
    image: postgres:14-alpine
    ports:
      - 5432:5432
    volumes:
      - ~/apps/postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    networks:
      - grocerylist_network

networks:
  grocerylist_network:
    driver: bridge